<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-a"></div>
    <div class="bg-orb bg-orb-b"></div>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <div class="brand-name">CampusSwap</div>
            <div class="brand-subtitle">Green Activity Rewards</div>
          </div>
        </div>

        <nav class="nav" id="nav"></nav>

        <div class="topbar-actions">
          <button id="quick-connect-btn" class="ghost-button">Connect</button>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <script src="../../node_modules/ethers/dist/ethers.umd.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
